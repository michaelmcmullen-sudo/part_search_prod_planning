<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM Material Explorer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        body { max-width: 95%; margin: 20px auto; font-family: sans-serif; }
        .search-container { background: #f0f4f8; padding: 20px; border-radius: 8px; border: 1px solid #d1d9e0; margin-bottom: 20px; }
        .table-wrapper { overflow-x: auto; border: 1px solid #ddd; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background-color: #005a9e; color: white; position: sticky; top: 0; }
        td, th { padding: 10px; border: 1px solid #ccc; text-align: left; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .loading { display: none; color: #005a9e; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>
    <h1>BOM Material Explorer</h1>
    
    <div class="search-container">
        <label for="partNumber">Enter Header Material (Part Number):</label>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <input type="text" id="partNumber" placeholder="e.g. 148204011" onkeypress="if(event.key==='Enter') searchData()">
            <button onclick="searchData()">View Data</button>
            <span id="status" class="loading">Searching...</span>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="dataTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>

    <script src="script.js"></script>
</body>
</html>
