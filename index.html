<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM Explorer Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        body { max-width: 98%; margin: 20px auto; }
        .search-area { background: #f0f4f8; padding: 20px; border-radius: 8px; border: 1px solid #d1d9e0; margin-bottom: 20px; }
        
        .table-container { 
            overflow-x: auto; 
            max-height: 75vh; 
            border: 1px solid #ddd; 
            background: white;
        }

        table { border-collapse: collapse; width: 100%; font-size: 0.85rem; table-layout: auto; }
        
        th { 
            background-color: #005a9e; 
            color: white; 
            position: sticky; 
            top: 0; 
            padding: 10px;
            min-width: 150px; /* Ensures filters have room */
            max-width: 300px;
            vertical-align: top;
            z-index: 10;
            text-align: left;
        }

        .column-filter {
            width: 100%;
            margin-top: 8px;
            font-size: 0.75rem;
            padding: 2px;
            border-radius: 4px;
            border: 1px solid #ccc;
            color: #333;
            background: white;
        }

        /* WRAP TEXT LOGIC START */
        td { 
            border: 1px solid #eee; 
            padding: 8px; 
            word-wrap: break-word;       /* Standard wrap */
            overflow-wrap: break-word;   /* Modern wrap */
            white-space: normal;         /* Allows text to wrap to next line */
            vertical-align: top;
            max-width: 300px;            /* Prevents columns from getting too wide */
        }
        /* WRAP TEXT LOGIC END */

        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f7ff; }

        #status { font-size: 0.8rem; margin-top: 8px; color: #555; font-weight: bold; }
        .controls { display: flex; gap: 10px; align-items: flex-end; }
        input { margin-bottom: 0 !important; }
    </style>
</head>
<body>
    <h1>BOM Material Explorer</h1>
    
    <div class="search-area">
        <div class="controls">
            <div style="flex-grow: 1;">
                <label>Global Part Search:</label>
                <input list="partList" id="partNumber" placeholder="Type a part number..." oninput="applyAllFilters()">
                <datalist id="partList"></datalist>
            </div>
            <button onclick="resetFilters()">Clear All Filters</button>
        </div>
        <div id="status">Connecting to database...</div>
    </div>

    <div class="table-container">
        <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
