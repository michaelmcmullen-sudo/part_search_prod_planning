<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM Explorer Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        body { max-width: 98%; margin: 20px auto; font-family: sans-serif; }
        .search-area { background: #f0f4f8; padding: 20px; border-radius: 8px; border: 1px solid #d1d9e0; margin-bottom: 20px; }
        .table-container { overflow: auto; max-height: 75vh; border: 1px solid #ddd; background: white; position: relative; }
        
        table { border-collapse: collapse; width: 100%; font-size: 0.85rem; table-layout: auto; }
        th { 
            background-color: #005a9e; color: white; position: sticky; top: 0; 
            padding: 10px; min-width: 150px; z-index: 10; text-align: left; 
        }

        /* Filter Icon/Button */
        .filter-btn {
            background: none; border: none; color: white; cursor: pointer;
            float: right; font-size: 1rem; padding: 0 5px;
        }
        .filter-btn:hover { color: #ffcc00; }

        /* Filter Popup Menu */
        .filter-menu {
            position: absolute; background: white; border: 1px solid #ccc;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); border-radius: 4px;
            padding: 10px; z-index: 100; display: none; color: #333;
            min-width: 200px; max-height: 300px; flex-direction: column;
        }
        .filter-menu.active { display: flex; }
        .filter-search { width: 100%; margin-bottom: 10px; padding: 5px; box-sizing: border-box; }
        .checkbox-list { overflow-y: auto; flex-grow: 1; max-height: 180px; border-top: 1px solid #eee; padding-top: 5px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; padding: 2px 0; font-size: 0.8rem; cursor: pointer; }
        .checkbox-item input { margin: 0; cursor: pointer; }
        
        .filter-actions { display: flex; justify-content: space-between; margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px; }
        .filter-actions button { padding: 2px 8px; font-size: 0.75rem; }

        td { border: 1px solid #eee; padding: 8px; white-space: normal; vertical-align: top; max-width: 300px; word-wrap: break-word; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        #status { font-size: 0.8rem; margin-top: 8px; color: #555; font-weight: bold; }
    </style>
</head>
<body>
    <h1>BOM Material Explorer</h1>
    <div class="search-area">
        <div style="display: flex; gap: 10px; align-items: flex-end;">
            <div style="flex-grow: 1;">
                <label>Global Search (Part Number):</label>
                <input list="partList" id="globalSearch" placeholder="Type to search..." oninput="applyAllFilters()">
                <datalist id="partList"></datalist>
            </div>
            <button onclick="resetAll()">Reset All Filters</button>
        </div>
        <div id="status">Connecting...</div>
    </div>

    <div class="table-container" id="container">
        <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div id="filterPool"></div>

    <script src="script.js"></script>
</body>
</html>
